spring:
  application:
    name: ai-gateway
  datasource:
    url: jdbc:mysql://localhost:3306/ai_gateway?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  sql:
    init:
      mode: never   # schema.sql 仅作参考，不自动执行；手动运行 schema.sql 初始化数据库

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.lava.ai_gateway.entity
  configuration:
    map-underscore-to-camel-case: true   # session_id → sessionId 自动映射

gateway:
  default-model: stub   # 默认模型，未配置真实 key 时回退到 stub
  providers:
    deepseek:
      base-url: https://api.deepseek.com
      api-key: ${DEEP_SEEK_API_KEY}
      models:
        - deepseek-chat
        - deepseek-reasoner

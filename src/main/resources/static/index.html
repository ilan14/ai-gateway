<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Gateway 调试</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #1a1a1a;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* 顶部工具栏 */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 12px 20px;
      background: #242424;
      border-bottom: 1px solid #333;
      flex-shrink: 0;
    }

    .toolbar h1 {
      font-size: 15px;
      font-weight: 600;
      color: #fff;
      margin-right: auto;
    }

    .toolbar label {
      font-size: 13px;
      color: #aaa;
    }

    select {
      background: #333;
      color: #e0e0e0;
      border: 1px solid #444;
      border-radius: 6px;
      padding: 5px 10px;
      font-size: 13px;
      cursor: pointer;
      outline: none;
    }

    select:focus { border-color: #666; }

    /* 流式开关 */
    .switch-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #aaa;
    }

    .switch {
      position: relative;
      width: 36px;
      height: 20px;
    }

    .switch input { opacity: 0; width: 0; height: 0; }

    .slider {
      position: absolute;
      inset: 0;
      background: #444;
      border-radius: 20px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .slider::before {
      content: "";
      position: absolute;
      width: 14px;
      height: 14px;
      left: 3px;
      top: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }

    .switch input:checked + .slider { background: #4f8ef7; }
    .switch input:checked + .slider::before { transform: translateX(16px); }

    /* 消息区域 */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message {
      max-width: 780px;
      width: 100%;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .message .role {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #666;
    }

    .message.user .role { color: #4f8ef7; }
    .message.assistant .role { color: #4caf82; }

    .message .content {
      font-size: 14px;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message.user .content {
      background: #2a2a2a;
      padding: 10px 14px;
      border-radius: 8px;
    }

    /* 光标闪烁 */
    .cursor {
      display: inline-block;
      width: 2px;
      height: 1em;
      background: #e0e0e0;
      margin-left: 2px;
      vertical-align: text-bottom;
      animation: blink 0.8s step-end infinite;
    }

    @keyframes blink { 50% { opacity: 0; } }

    /* 底部输入区 */
    .input-area {
      padding: 16px 20px;
      background: #242424;
      border-top: 1px solid #333;
      flex-shrink: 0;
    }

    .input-wrap {
      max-width: 780px;
      margin: 0 auto;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    textarea {
      flex: 1;
      background: #2e2e2e;
      color: #e0e0e0;
      border: 1px solid #444;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      outline: none;
      line-height: 1.5;
      min-height: 44px;
      max-height: 180px;
      overflow-y: auto;
    }

    textarea:focus { border-color: #555; }
    textarea::placeholder { color: #555; }

    button {
      background: #4f8ef7;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 18px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
      height: 44px;
    }

    button:hover { background: #3a7de8; }
    button:disabled { background: #333; color: #666; cursor: not-allowed; }

    /* 错误提示 */
    .error {
      color: #e57373;
      font-size: 13px;
      font-style: italic;
    }

    /* 空状态 */
    .empty-hint {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #444;
      font-size: 14px;
    }
  </style>
</head>
<body>

<div class="toolbar">
  <h1>AI Gateway</h1>

  <label for="modelSelect">模型</label>
  <select id="modelSelect">
    <option value="">加载中…</option>
  </select>

  <div class="switch-wrap">
    <label for="streamToggle">流式</label>
    <label class="switch">
      <input type="checkbox" id="streamToggle" checked />
      <span class="slider"></span>
    </label>
  </div>

  <button id="clearBtn" style="background:#333;font-size:12px;padding:6px 12px;height:auto;">清空对话</button>
</div>

<div class="messages" id="messages">
  <div class="empty-hint" id="emptyHint">选择模型，输入问题，开始对话</div>
</div>

<div class="input-area">
  <div class="input-wrap">
    <textarea id="input" placeholder="输入问题，Shift+Enter 换行，Enter 发送" rows="1"></textarea>
    <button id="sendBtn">发送</button>
  </div>
</div>

<script>
  const messagesEl  = document.getElementById('messages');
  const inputEl     = document.getElementById('input');
  const sendBtn     = document.getElementById('sendBtn');
  const modelSelect = document.getElementById('modelSelect');
  const streamToggle= document.getElementById('streamToggle');
  const emptyHint   = document.getElementById('emptyHint');

  // 从 /v1/models 加载模型列表
  (async () => {
    try {
      const res = await fetch('/v1/models');
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      const models = data.data ?? [];
      modelSelect.innerHTML = '';
      models.forEach(m => {
        const opt = document.createElement('option');
        opt.value = m.id;
        opt.textContent = m.owned_by ? `${m.id}（${m.owned_by}）` : m.id;
        modelSelect.appendChild(opt);
      });
    } catch (err) {
      modelSelect.innerHTML = `<option value="">加载失败: ${err.message}</option>`;
    }
  })();

  // 对话历史（传给后端）
  let history = [];

  // 自动撑高 textarea
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 180) + 'px';
  });

  // Enter 发送，Shift+Enter 换行
  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  });

  sendBtn.addEventListener('click', send);
  document.getElementById('clearBtn').addEventListener('click', () => {
    history = [];
    messagesEl.innerHTML = '';
    messagesEl.appendChild(emptyHint);
  });

  function appendMessage(role, content) {
    emptyHint.remove();
    const wrap = document.createElement('div');
    wrap.className = `message ${role}`;
    wrap.innerHTML = `<div class="role">${role === 'user' ? '你' : '助手'}</div>
                      <div class="content"></div>`;
    messagesEl.appendChild(wrap);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return wrap.querySelector('.content');
  }

  async function send() {
    const text = inputEl.value.trim();
    if (!text || sendBtn.disabled) return;

    // 显示用户消息
    appendMessage('user', text);
    history.push({ role: 'user', content: text });

    inputEl.value = '';
    inputEl.style.height = 'auto';
    sendBtn.disabled = true;

    const model  = modelSelect.value;
    const stream = streamToggle.checked;
    const contentEl = appendMessage('assistant', '');

    try {
      if (stream) {
        await sendStream(model, contentEl);
      } else {
        await sendNormal(model, contentEl);
      }
    } catch (err) {
      contentEl.innerHTML = `<span class="error">请求失败：${err.message}</span>`;
    } finally {
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }

  async function sendNormal(model, contentEl) {
    const res = await fetch('/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model, messages: history, stream: false })
    });

    if (!res.ok) throw new Error(`HTTP ${res.status}`);

    const data = await res.json();
    const reply = data.choices?.[0]?.message?.content ?? '';
    contentEl.textContent = reply;
    history.push({ role: 'assistant', content: reply });
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  async function sendStream(model, contentEl) {
    const res = await fetch('/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model, messages: history, stream: true })
    });

    if (!res.ok) throw new Error(`HTTP ${res.status}`);

    // 添加光标
    const cursor = document.createElement('span');
    cursor.className = 'cursor';
    contentEl.appendChild(cursor);

    const reader  = res.body.getReader();
    const decoder = new TextDecoder();
    let reply  = '';
    let buffer = '';   // 处理跨 chunk 的不完整行

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      // 最后一段可能不完整，留到下次拼接
      buffer = lines.pop();

      for (const line of lines) {
        if (!line.startsWith('data:')) continue;
        const payload = line.slice(5).trim();
        if (payload === '[DONE]') break;

        try {
          const json    = JSON.parse(payload);
          const content = json.choices?.[0]?.delta?.content ?? '';
          reply += content;
          // 先移除光标，追加文字，再加回光标
          cursor.remove();
          contentEl.textContent = reply;
          contentEl.appendChild(cursor);
          messagesEl.scrollTop = messagesEl.scrollHeight;
        } catch { /* 忽略非 JSON 帧 */ }
      }
    }

    cursor.remove();
    history.push({ role: 'assistant', content: reply });
  }
</script>
</body>
</html>
